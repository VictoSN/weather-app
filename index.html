<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Application</title>
    <link rel="icon" href="images/Logo Circle.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="weather">
        <div id="cityDiv"></div>
        <div id="inputDiv">
            <div id="searchDiv">
                <input id="searchBox" placeholder="Kuala Lumpur">
                <button id="submitButton">
                    <img src="images/magnifying.svg" alt="Search">
                </button>            
            </div>
            <div id="filterDiv">
                <input id="metricUnit" class="unitRadio" name="unitRadio" value="metric" type="radio" checked="true">Metric
                <input id="imperialUnit" class="unitRadio" name="unitRadio" value="imperial" type="radio">Imperial
                <input id="kelvinUnit" class="unitRadio" name="unitRadio" value="kelvin" type="radio">Kelvin
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
